version: '3.9'

services:
  test-invoices-db:
    image: mysql:8.0
    container_name: test_invoices_mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DOCKER_DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: test_invoices_php8_4
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
      - ./:/var/www/html
    depends_on:
      - test-invoices-db

  nginx:
    image: nginx:alpine
    container_name: test_invoices_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
    depends_on:
      - php

volumes:
  db_data:
