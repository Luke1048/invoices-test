version: '3.9'

services:
    test-invoices-db:
        image: mysql:8.0
        container_name: test_invoices_mysql
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        ports:
            - "${DOCKER_DB_PORT}:3306"
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - app-network

    php:
        build:
            context: ./docker/php
            dockerfile: Dockerfile
        container_name: test_invoices_php8_4
        restart: always
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/php.ini
        depends_on:
            - test-invoices-db
        networks:
            - app-network

    nginx:
        image: nginx:alpine
        container_name: test_invoices_nginx
        restart: always
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - app-network

    nuxt:
        image: node:22-alpine
        container_name: test_invoices_nuxt
        working_dir: /app
        ports:
            - "3000:3000"
        volumes:
            - ./frontend:/app
            - /app/node_modules
        command: sh -c "npm install && npm run dev"
        environment:
            HOST: 0.0.0.0
            PORT: 3000
#            NUXT_PUBLIC_API_BASE: http://test_invoices_nginx
            NUXT_API_BASE: http://test_invoices_nginx
            NUXT_PUBLIC_API_BASE: http://localhost:8080
        networks:
            - app-network

volumes:
    db_data:

networks:
    app-network:
        driver: bridge
